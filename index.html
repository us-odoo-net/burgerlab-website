<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BurgerLab — The Lab Burger</title>
    <meta
      name="description"
      content="BurgerLab: a dark luxury burger experience. Scroll to take The Lab Burger apart, layer by layer."
    />
    <meta name="theme-color" content="#10100F" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%8D%94%3C%2Ftext%3E%3C%2Fsvg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="preloader" id="preloader" aria-hidden="true">
      <span class="preloader__word">Burger<b>Lab</b></span>
      <span class="preloader__bar"><i id="preloader-fill"></i></span>
    </div>
    <video
      id="bgv"
      class="bg-video"
      src="bg.mp4"
      data-mobile-src="bg-mobile.mp4"
      poster="img/hero-burger.webp"
      muted
      playsinline
      preload="none"
      aria-hidden="true"
    ></video>
    <div class="bg-tint" aria-hidden="true"></div>
    <div class="ambient-dots" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
