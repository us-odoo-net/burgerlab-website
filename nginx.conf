server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;

  gzip on;
  gzip_types text/css application/javascript text/javascript application/json image/svg+xml text/plain;
  gzip_min_length 1024;

  # Hashed bundles: safe to cache forever. ^~ wins over the media regex below
  # (a hashed asset must never silently drop from immutable to 1h).
  location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options nosniff always;
    try_files $uri =404;
  }

  # Media keeps its filename across deploys: short cache + etag revalidation.
  location ~* \.(mp4|webp|png|jpg|svg)$ {
    add_header Cache-Control "public, max-age=3600";
    add_header X-Content-Type-Options nosniff always;
    try_files $uri =404;
  }

  # index.html must always revalidate (heuristic caching served stale HTML
  # whose hashed assets no longer existed → dead page).
  location / {
    add_header Cache-Control "no-cache";
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    try_files $uri $uri/ /index.html;
  }
}
