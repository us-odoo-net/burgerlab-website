server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml text/plain;
  gzip_min_length 1024;

  # Hashed bundles: safe to cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Media keeps its filename across deploys: short cache + etag revalidation.
  location ~* \.(mp4|webp|png|jpg|svg)$ {
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  # index.html must always revalidate (heuristic caching served stale HTML
  # whose hashed assets no longer existed → dead page).
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
